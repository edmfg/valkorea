    <button onClick={() => !single && onSelect(option.id)} disabled={single} className={cardClass}>
      {option.image && (
        <div className="relative h-36 overflow-hidden">

        )}
        <p className={`font-semibold text-sm leading-snug mb-2 tracking-tight ${selected ? 'text-violet-900 pr-7' : 'text-slate-900 pr-2'}`}>{option.title}</p>

                <span className="text-slate-500 text-[10px] leading-tight">{p}</span>
              </div>
            ))}</div>
            <div>{(option.cons || []).map((c, i) => (

// ── MEAL SLIDERS ──────────────────────────────────────────────────────────────
function MealSliders({ dayId, slotId, sliderState, onSliderChange }) {
  const adv = sliderState[`${dayId}-${slotId}-adv`] ?? 0
  const pace = sliderState[`${dayId}-${slotId}-pace`] ?? 0
  const quadrant = (adv >= 50 ? 1 : 0) * 2 + (pace >= 50 ? 1 : 0)
  const recs = MEAL_RECS[dayId]?.[slotId] || []
  const rec = recs[[0, 1, 2, 3][quadrant]] || recs[0]
  return (
    <div className="space-y-3">
      <div>
        <span className="text-[10px] text-slate-400 font-semibold uppercase tracking-wider">Spirit</span>
        <input type="range" min="0" max="100" step="1" value={adv}
          onChange={e => onSliderChange(`${dayId}-${slotId}-adv`, Number(e.target.value))}
          className="range-slider"
          style={{ background: `linear-gradient(to right, #7c3aed ${adv}%, #e5e7eb ${adv}%)` }} />
        <div className="flex justify-between text-[10px] text-slate-300"><span>Safe</span><span>Bold</span></div>
      </div>
      <div>
        <span className="text-[10px] text-slate-400 font-semibold uppercase tracking-wider">Pace</span>
        <input type="range" min="0" max="100" step="1" value={pace}
          onChange={e => onSliderChange(`${dayId}-${slotId}-pace`, Number(e.target.value))}
          className="range-slider"
          style={{ background: `linear-gradient(to right, #7c3aed ${pace}%, #e5e7eb ${pace}%)` }} />
        <div className="flex justify-between text-[10px] text-slate-300"><span>Quick</span><span>Linger</span></div>
      </div>
      {rec && (
        <div className="bg-violet-50 rounded-xl p-3 border border-violet-100">
          <span className="inline-block text-[9px] bg-violet-100 text-violet-700 font-bold px-2 py-0.5 rounded-full uppercase tracking-wider mb-1.5">{QUADRANT_LABELS[quadrant]}</span>
          <p className="text-slate-900 text-xs font-semibold leading-snug mb-0.5">{rec.label}</p>
          <p className="text-slate-500 text-[10px] leading-relaxed">{rec.desc}</p>
          <p className="text-violet-600 text-[10px] mt-1 font-medium">{rec.cost}</p>
        </div>
      )}
    </div>
  )
}

// ── SLOT SECTION ──────────────────────────────────────────────────────────────
function SlotSection({ slot, slotKey, selections, onSelect }) {
  if (slot.type === 'sliders') return null
  const selected = selections[slotKey]
  const single = slot.options?.length === 1
  return (
    <div className="mb-8">
      <div className="flex items-center gap-2 mb-3">
        <span className="text-sm">{SLOT_ICONS[slot.id] || '·'}</span>
        <h3 className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.12em]">{slot.label}</h3>
      </div>
      <div className={`grid gap-3 ${slot.options?.length >= 2 ? 'sm:grid-cols-2' : ''} ${slot.options?.length === 3 ? 'lg:grid-cols-3' : ''}`}>
        {(slot.options || []).map(opt => (
          <OptionCard key={opt.id} option={opt} selected={selected === opt.id} single={single} onSelect={id => onSelect(slotKey, id)} />
        ))}
      </div>
      {slot.snack && <SnackCard snack={slot.snack} />}
    </div>
  )
}

const WX_CODES = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️'}
const PACKING = {0:"Light layers — you won't need a jacket mid-afternoon.",1:'Layers recommended. Nice day overall.',2:'Bring a light jacket.',3:'Overcast but dry. Layer up.',45:'Misty morning — bring layers.',48:'Foggy. Atmospheric for the palaces.',51:'Light drizzle possible — pack a compact umbrella.',53:'Light drizzle likely.',55:'Drizzle. Compact umbrella essential.',61:'Rain jacket needed.',63:'Proper rain jacket. Good museum day.',65:'Heavy rain. Indoor day.',71:'Light snow. Unlikely in October.',80:'Showers. Umbrella.',81:'Showers, heavier.',82:'Heavy showers. Indoor plan.',95:'Thunderstorm possible. Stay close to shelter.'}

function WeatherWidget() {
  const [wx, setWx] = useState(null)
  const [error, setError] = useState(false)
  useEffect(() => {
    fetch('https://api.open-meteo.com/v1/forecast?latitude=37.5665&longitude=126.9780&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode&timezone=Asia%2FSeoul&forecast_days=1')
      .then(r => r.json())
      .then(d => {
        const daily = d.daily
        setWx({ max: Math.round(daily.temperature_2m_max[0]), min: Math.round(daily.temperature_2m_min[0]), rain: daily.precipitation_probability_max[0], code: daily.weathercode[0] })
      })
      .catch(() => setError(true))
  }, [])
  const emoji = wx ? (WX_CODES[wx.code] || '🌡️') : '…'
  const tip = wx ? (PACKING[wx.code] || 'Layers recommended.') : null
  return (
    <div className={`${card} p-4`}>
      <p className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.12em] mb-3">Seoul · Today</p>
      {error ? <p className="text-slate-400 text-xs">Weather unavailable</p> : (
        <>
          <div className="flex items-end gap-3 mb-3">
            <span className="text-4xl leading-none">{emoji}</span>
            <div>
              {wx ? (<><p className="text-3xl font-bold text-slate-900 tracking-tight leading-none">{wx.max}°</p><p className="text-slate-400 text-xs mt-1">{wx.min}°–{wx.max}° · Seoul</p></>) : <p className="text-slate-400 text-sm">Loading…</p>}
            </div>
          </div>
          {wx && (
            <>
              <div className="mb-2">
                <div className="flex justify-between text-xs mb-1"><span className="text-slate-400">Rain</span><span className="text-slate-700 font-semibold">{wx.rain}%</span></div>
                <div className="h-1.5 bg-slate-100 rounded-full overflow-hidden"><div className="h-full bg-violet-500 rounded-full transition-all" style={{ width: `${wx.rain}%` }} /></div>
              </div>
              {tip && <p className="text-slate-400 text-[10px] leading-relaxed mt-2">{tip}</p>}
            </>
          )}
        </>
      )}
    </div>
  )
}

// ── CURRENCY WIDGET ───────────────────────────────────────────────────────────
function CurrencyWidget() {
  const [krwAmount, setKrwAmount] = useState(50000)
  const [rate, setRate] = useState(null)
  const [fetchedAt, setFetchedAt] = useState(null)
  const [error, setError] = useState(false)
  useEffect(() => {
    fetch('https://api.frankfurter.app/latest?from=KRW&to=GBP')
      .then(r => r.json())
      .then(d => { setRate(d.rates.GBP); setFetchedAt(new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })) })
      .catch(() => setError(true))
  }, [])
  const gbp = rate ? (krwAmount * rate).toFixed(2) : null
  const gbpToKrw = rate ? Math.round(1 / rate).toLocaleString('en-GB') : null
  const max = 500000
  const pct = Math.round((krwAmount / max) * 100)
  return (
    <div className={`${card} p-4`}>
      <p className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.12em] mb-3">₩ → £</p>
      {error ? <p className="text-slate-400 text-xs">Rate unavailable</p> : (
        <>
          <div className="relative mt-5 mb-1">
            <div className="absolute -top-4 text-violet-600 text-[10px] font-bold pointer-events-none" style={{ left: `calc(${pct}% - ${Math.round(pct * 0.3)}px)` }}>
              ₩{krwAmount.toLocaleString('en-GB')}
            </div>
            <input type="range" min="0" max={max} step="1000" value={krwAmount}
              onChange={e => setKrwAmount(Number(e.target.value))}
              className="range-slider"
              style={{ background: `linear-gradient(to right, #7c3aed ${pct}%, #e5e7eb ${pct}%)` }} />
            <div className="flex justify-between text-[10px] text-slate-300 mt-1"><span>₩0</span><span>₩500k</span></div>
          </div>
          <div className="mt-3 pt-3 border-t border-slate-100">
            {gbp ? (<><p className="text-xl font-bold text-slate-900 tracking-tight">£{gbp}</p><p className="text-slate-400 text-[10px] mt-1">£1 = ₩{gbpToKrw} · {fetchedAt}</p></>) : <p className="text-slate-400 text-sm">Loading…</p>}
          </div>
        </>
      )}
    </div>
  )
}

// ── MAP SECTION ───────────────────────────────────────────────────────────────
function MapSection({ activeTab }) {
  const mapRef = useRef(null)
  const instanceRef = useRef(null)
  const layerRef = useRef(null)
  const [ready, setReady] = useState(false)
  useEffect(() => {
    if (!mapRef.current) return
    const tryInit = () => {
      if (!window.L) { setTimeout(tryInit, 200); return }
      const L = window.L
      const map = L.map(mapRef.current, { center: [37.5519, 127.0000], zoom: 12, zoomControl: true, scrollWheelZoom: false })
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap contributors' }).addTo(map)
      instanceRef.current = map
      layerRef.current = L.layerGroup().addTo(map)
      setReady(true)
    }
    tryInit()
    return () => { instanceRef.current?.remove(); instanceRef.current = null }
  }, [])
  useEffect(() => {
    if (!ready || !window.L || !layerRef.current) return
    const L = window.L
    layerRef.current.clearLayers()
    const locs = MAP_LOCATIONS[activeTab]
    if (!locs) return
    if (locs.length > 1) {
      L.polyline(locs.map(l => l.coords), { color: '#7c3aed', weight: 3, opacity: 0.6, dashArray: '6 4' }).addTo(layerRef.current)
    }
    locs.forEach((loc, i) => {
      const icon = L.divIcon({
        html: `<div style="width:30px;height:30px;background:#7c3aed;border-radius:50%;border:2px solid #c4b5fd;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:-apple-system,system-ui,sans-serif;box-shadow:0 0 10px rgba(124,58,237,0.45);">${i + 1}</div>`,
        className: '', iconSize: [30, 30], iconAnchor: [15, 15],
      })
      L.marker(loc.coords, { icon }).addTo(layerRef.current).bindPopup(`<b>${loc.name}</b><br><small>${loc.transport}</small>`)
      if (i > 0 && loc.transport) {
        const prev = locs[i - 1]
        const labelIcon = L.divIcon({
          html: `<div style="background:rgba(255,255,255,0.92);border:1px solid #c4b5fd;color:#7c3aed;font-size:9px;padding:2px 5px;border-radius:4px;white-space:nowrap;font-family:-apple-system,system-ui,sans-serif;">${loc.transport}</div>`,
          className: '', iconSize: [1, 1], iconAnchor: [0, 0],
        })
        L.marker([(prev.coords[0] + loc.coords[0]) / 2, (prev.coords[1] + loc.coords[1]) / 2], { icon: labelIcon }).addTo(layerRef.current)
      }
    })
    if (locs.length === 1) {
      instanceRef.current.setView(locs[0].coords, 14, { animate: true })
    } else {
      instanceRef.current.fitBounds(L.latLngBounds(locs.map(l => l.coords)), { padding: [55, 55], maxZoom: 14, animate: true })
    }
  }, [ready, activeTab])
  return (
    <section className="mt-8 mb-2">
      <div className="flex items-center gap-2.5 mb-3">
        <span className="text-violet-400 text-xs">✦</span>
        <h2 className="text-sm font-bold text-slate-800 tracking-tight">Day Route</h2>
        <span className="text-slate-300 text-xs">numbered in visit order</span>
      </div>
      <div ref={mapRef} className="rounded-2xl overflow-hidden border border-purple-100 shadow-sm" style={{ height: '340px' }} />
    </section>
  )
}

          const selectedActivities = activitySlots.map(slot => {

              <p className="text-slate-400 text-[10px] mt-1">No activities selected yet.</p>

            <div key={day.id} className={`${card} p-5`}>

                <span className="text-slate-200 text-sm">·</span>
                <span className="text-slate-700 font-semibold text-sm">{day.title}</span>

                    <span className="text-base flex-shrink-0">{SLOT_ICONS[slot.id] || '·'}</span>
                    <div>
                      <p className="text-xs font-semibold text-slate-700">{option.title}</p>
                      {option.practical && <p className="text-[10px] text-slate-400 mt-0.5">{option.practical}</p>}

                    <span className="text-base flex-shrink-0">{SLOT_ICONS[slot.id] || '·'}</span>
                    <div>
                      <p className="text-xs font-semibold text-slate-700">{rec.label}</p>
                      <p className="text-[10px] text-slate-400 mt-0.5">{rec.cost}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )
        })}
        {(() => {

          if (!city) return null
          return (

function SparkleIcon({ size = 22 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">
      <path d="M12 3v4M12 17v4M3 12h4M17 12h4M6.3 6.3l2.8 2.8M14.9 14.9l2.8 2.8M17.7 6.3l-2.8 2.8M9.1 14.9l-2.8 2.8" />
    </svg>
  )
}

function ChatWidget() {
  const [open, setOpen] = useState(false)
  const [messages, setMessages] = useState([
    { role: 'assistant', text: "Hi! I'm your Korea trip guide ✦ Ask me about the itinerary, food, getting around Seoul, or what to do with a child in tow." },
  ])
  const [input, setInput] = useState('')
  const [loading, setLoading] = useState(false)
  const [error, setError] = useState(null)
  const scrollRef = useRef(null)
  const inputRef = useRef(null)

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight
  }, [messages, loading])

  useEffect(() => {
    if (open && inputRef.current) inputRef.current.focus()
  }, [open])

  async function send() {
    const text = input.trim()
    if (!text || loading) return
    setError(null)
    const next = [...messages, { role: 'user', text }]
    setMessages(next)
    setInput('')
    setLoading(true)
    try {
      const r = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: next.slice(1) }),
      })
      const data = await r.json()
      if (!r.ok || !data.reply) {
        setError(data.error || 'Something went wrong. Try again.')
      } else {
        setMessages(m => [...m, { role: 'assistant', text: data.reply }])
      }
    } catch {
      setError('Could not reach the trip guide. Check your connection.')
    } finally {
      setLoading(false)
    }
  }

  function onKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault()
      send()
    }
  }

  return (
    <>
      {open && (
        <div className="fixed z-40 bottom-24 right-5 w-[calc(100vw-2.5rem)] max-w-sm h-[32rem] max-h-[70vh] flex flex-col bg-white rounded-2xl border border-purple-100 shadow-2xl shadow-violet-200/50 overflow-hidden">
          <div className="flex items-center justify-between px-4 py-3 bg-violet-600 text-white flex-shrink-0">
            <div className="flex items-center gap-2">
              <SparkleIcon size={18} />
              <div>
                <p className="text-sm font-bold tracking-tight leading-none">Trip Guide</p>
                <p className="text-[10px] text-violet-200 mt-0.5">Korea · powered by Gemini</p>
              </div>
            </div>
            <button onClick={() => setOpen(false)} aria-label="Close chat" className="text-violet-100 hover:text-white text-xl leading-none px-1">×</button>
          </div>

          <div ref={scrollRef} className="flex-1 overflow-y-auto px-4 py-4 space-y-3 bg-[#faf9fd]">
            {messages.map((m, i) => (
              <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div className={`max-w-[85%] rounded-2xl px-3.5 py-2.5 text-xs leading-relaxed whitespace-pre-wrap ${m.role === 'user' ? 'bg-violet-600 text-white rounded-br-sm' : 'bg-white border border-purple-100 text-slate-700 rounded-bl-sm'}`}>
                  {m.text}
                </div>
              </div>
            ))}
            {loading && (
              <div className="flex justify-start">
                <div className="bg-white border border-purple-100 rounded-2xl rounded-bl-sm px-3.5 py-3">
                  <span className="flex gap-1">
                    <span className="w-1.5 h-1.5 rounded-full bg-violet-300 animate-bounce" style={{ animationDelay: '0ms' }} />
                    <span className="w-1.5 h-1.5 rounded-full bg-violet-300 animate-bounce" style={{ animationDelay: '150ms' }} />
                    <span className="w-1.5 h-1.5 rounded-full bg-violet-300 animate-bounce" style={{ animationDelay: '300ms' }} />
                  </span>
                </div>
              </div>
            )}
            {error && <p className="text-center text-rose-400 text-[10px]">{error}</p>}
          </div>

          <div className="flex items-end gap-2 p-3 border-t border-slate-100 bg-white flex-shrink-0">
            <textarea
              ref={inputRef}
              rows={1}
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={onKeyDown}
              placeholder="Ask about the trip…"
              className="flex-1 resize-none rounded-xl border border-purple-100 px-3 py-2 text-xs text-slate-700 placeholder:text-slate-300 focus:outline-none focus:border-violet-400 focus:ring-1 focus:ring-violet-200 max-h-24"
            />
            <button
              onClick={send}
              disabled={loading || !input.trim()}
              className="flex-shrink-0 w-9 h-9 rounded-xl bg-violet-600 text-white flex items-center justify-center disabled:opacity-40 hover:bg-violet-700 transition-colors">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" /></svg>
            </button>
          </div>
        </div>
      )}

      <button
        onClick={() => setOpen(o => !o)}
        aria-label="Open trip guide chat"
        className="fixed z-40 bottom-5 right-5 w-14 h-14 rounded-full bg-violet-600 text-white shadow-lg shadow-violet-300/60 flex items-center justify-center hover:bg-violet-700 hover:scale-105 transition-all duration-200">
        {open
          ? <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>
          : <SparkleIcon size={24} />}
      </button>
    </>
  )
}

const STORAGE_KEY = 'korea-trip-v2'
function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}') }
  catch { return {} }
}

function App() {
  const [activeTab, setActiveTab] = useState('day1')
  const saved = loadState()
  const [selections, setSelections] = useState(saved.selections || {})
  const [sliderState, setSliderState] = useState(saved.sliders || {})
  const [openShortlists, setOpenShortlists] = useState([])
  const [openNotes, setOpenNotes] = useState([])

  useEffect(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ selections, sliders: sliderState }))
  }, [selections, sliderState])

  useEffect(() => {
    const encoded = encodeURIComponent(KUROMI_SVG)
    document.body.style.backgroundImage = `url("data:image/svg+xml,${encoded}")`
    document.body.style.backgroundRepeat = 'repeat'
    document.body.style.backgroundColor = '#f7f5fb'
    return () => { document.body.style.backgroundImage = '' }
  }, [])

  function handleSelect(slotKey, optionId) {
    setSelections(prev => {
      if (prev[slotKey] === optionId) { const n = { ...prev }; delete n[slotKey]; return n }
      return { ...prev, [slotKey]: optionId }
    })
  }

  function handleSlider(key, value) {
    setSliderState(prev => ({ ...prev, [key]: value }))
  }

  function handleClear() {
    if (window.confirm('Clear all saved choices? This cannot be undone.')) {
      setSelections({})
      setSliderState({})
    }
  }

  const activeDay = DAYS.find(d => d.id === activeTab)
  const totalSelections = Object.keys(selections).length
  const isContentTab = activeTab !== 'secondcity' && activeTab !== 'myplan'

  return (
    <div className="min-h-screen text-slate-900">
      <header className="text-center py-8 px-4 bg-white border-b border-purple-100 shadow-sm">
        <div className="text-violet-400 text-sm tracking-[0.5em] mb-3">♠ ✦ ♠</div>
        <h1 className="text-3xl sm:text-4xl font-bold tracking-tight leading-tight">
          <span className="text-slate-900">Korea</span>
          <span className="text-violet-500"> · </span>
          <span className="text-slate-900">Late October</span>
        </h1>
        <p className="text-slate-400 text-sm mt-2 tracking-wide">Vale &amp; [Child] · 7–8 days · Seoul + one more city</p>
        {totalSelections > 0 && (
          <p className="mt-3 text-xs text-violet-400">
            {totalSelections} {totalSelections === 1 ? 'choice' : 'choices'} saved ·{' '}
            <button onClick={handleClear} className="text-slate-400 hover:text-slate-600 underline transition-colors">clear all</button>
          </p>
        )}
      </header>

      <nav className="sticky top-0 z-20 bg-white/90 backdrop-blur-md border-b border-purple-100 shadow-sm">
        <div className="overflow-x-auto">
          <div className="flex gap-1 p-2 min-w-max mx-auto max-w-6xl">
            {TABS.map(tab => {
              const isActive = activeTab === tab.id
              const day = DAYS.find(d => d.id === tab.id)
              const complete = day ? isDayComplete(day, selections) : false
              return (
                <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                  className={`relative px-3.5 py-1.5 rounded-full text-sm font-medium transition-all duration-200 whitespace-nowrap ${isActive ? 'bg-violet-600 text-white shadow-md shadow-violet-200' : 'text-slate-600 hover:text-violet-700 hover:bg-violet-50'}`}>
                  {tab.label}
                  {complete && !isActive && (
                    <span className="absolute -top-0.5 -right-0.5 w-2.5 h-2.5 rounded-full bg-emerald-400 border-2 border-white" />
                  )}
                </button>
              )
            })}
          </div>
        </div>
      </nav>

      <div className="max-w-6xl mx-auto px-4 py-6">
        <div className="lg:flex lg:gap-6 lg:items-start">
          <aside className="hidden lg:block w-72 flex-shrink-0 sticky top-14 self-start">
            <DaySidebar activeDay={activeDay} sliderState={sliderState} onSliderChange={handleSlider} />
          </aside>
          <div className="flex-1 min-w-0">
            <div className="lg:hidden mb-6">
              <DaySidebar activeDay={activeDay} sliderState={sliderState} onSliderChange={handleSlider} />
            </div>
            {activeTab === 'secondcity' ? (
              <SecondCityView selections={selections} onSelect={handleSelect} />
            ) : activeTab === 'myplan' ? (
              <MyPlanView selections={selections} sliderState={sliderState} />
            ) : activeDay ? (
              <DayView day={activeDay} selections={selections} onSelect={handleSelect} />
            ) : null}
            {isContentTab && <MapSection activeTab={activeTab} />}

            <section className="mt-12 pt-8 border-t border-slate-100">
              <div className="flex items-center gap-3 mb-4">
                <span className="text-violet-400 text-xs">✦</span>
                <h2 className="text-base font-bold text-slate-800 tracking-tight">Curated Shortlists</h2>
              </div>
              <div className="space-y-2">
                {SHORTLISTS.map(list => (
                  <Accordion key={list.id} title={list.label} icon={list.icon}
                    open={openShortlists.includes(list.id)}
                    onToggle={() => setOpenShortlists(prev => prev.includes(list.id) ? prev.filter(x => x !== list.id) : [...prev, list.id])}>
                    <ShortlistTable list={list} />
                  </Accordion>
                ))}
              </div>
            </section>

            <section className="mt-8 pt-8 border-t border-slate-100 mb-20">
              <div className="flex items-center gap-3 mb-4">
                <span className="text-violet-400 text-xs">✦</span>
                <h2 className="text-base font-bold text-slate-800 tracking-tight">Practical Notes</h2>
              </div>
              <div className="space-y-2">
                {PRACTICAL_NOTES.map(note => (
                  <Accordion key={note.id} title={note.title}
                    open={openNotes.includes(note.id)}
                    onToggle={() => setOpenNotes(prev => prev.includes(note.id) ? prev.filter(x => x !== note.id) : [...prev, note.id])}>
                    <div className="px-4 py-4 space-y-3 bg-slate-50">
                      {note.content.map((para, i) => <p key={i} className="text-slate-600 text-sm leading-relaxed">{para}</p>)}
                    </div>
                  </Accordion>
                ))}
              </div>
              <p className="text-center text-slate-300 text-xs mt-10 tracking-[0.2em]">♠ kuromi-coded · adjust as you go ♠</p>
            </section>
          </div>
        </div>
      </div>

      <ChatWidget />
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />)
</script>
</body>
</html>
